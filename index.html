<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Discovery Pro</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .group-card { background: #111112; border: 1px solid #222; transition: all 0.2s ease; }
        .group-card:hover { border-color: #444; transform: translateY(-2px); }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="container mx-auto px-4 py-12 max-w-6xl">
        <header class="mb-12">
            <h1 class="text-4xl font-black tracking-tight mb-2">Discovery</h1>
            <p class="text-gray-500">Search communities, pages, and events.</p>
        </header>

        <div class="relative mb-10">
            <input type="text" id="search-input" 
                placeholder="Search keywords..." 
                class="w-full bg-[#111] border border-[#222] rounded-2xl py-6 pl-8 pr-40 text-xl focus:outline-none focus:border-blue-500 transition-all shadow-2xl">
            
            <button id="search-btn" class="absolute right-3 top-3 bottom-3 bg-blue-600 hover:bg-blue-500 text-white px-8 rounded-xl font-bold transition-all active:scale-95 flex items-center gap-3">
                <svg id="loading-icon" class="hidden w-5 h-5 spinner" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span>Search</span>
            </button>
        </div>

        <div id="results-count" class="text-gray-500 text-sm mb-6 font-medium uppercase tracking-widest">Ready</div>

        <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        const APP_ID = 53969951;
        let accessToken = null;

        const input = document.getElementById('search-input');
        const btn = document.getElementById('search-btn');
        const grid = document.getElementById('results-grid');
        const countDisplay = document.getElementById('results-count');
        const loader = document.getElementById('loading-icon');

        async function init() {
            try { await vkBridge.send('VKWebAppInit'); } catch (e) {}
        }

        async function search() {
            const query = input.value.trim();
            if (!query) return;

            btn.disabled = true;
            loader.classList.remove('hidden');
            grid.style.opacity = '0.5';

            try {
                if (!accessToken) {
                    const auth = await vkBridge.send('VKWebAppGetAuthToken', { 
                        app_id: APP_ID, 
                        scope: 'groups' 
                    });
                    accessToken = auth.access_token;
                }

                // Call VK API with the corrected 'type' parameter
                // We use 'group' (singular) as the primary type to ensure compatibility
                const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'groups.search',
                    params: {
                        q: query,
                        count: 40,
                        extended: 1,
                        safe_searching: 0, 
                        type: 'group', // Fixed to singular 'group' to prevent invalid type errors
                        fields: 'members_count,activity,description,verified',
                        v: '5.131',
                        access_token: accessToken
                    }
                });

                const results = response.response?.items || response.items || [];
                render(results);

            } catch (err) {
                console.error("API Error:", err);
                const errorMsg = err.error_data?.error_msg || err.message || "Unknown Error";
                alert("VK API Error: " + errorMsg);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                grid.style.opacity = '1';
            }
        }

        function render(groups) {
            countDisplay.innerText = `Found ${groups.length} results`;
            
            if (groups.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-600 italic">No matches found.</div>`;
                return;
            }

            grid.innerHTML = groups.map(g => {
                const link = `https://vk.com/${g.screen_name || 'public' + g.id}`;
                return `
                <div class="group-card rounded-2xl p-6 flex flex-col">
                    <div class="flex items-center gap-4 mb-4">
                        <img src="${g.photo_100}" class="w-12 h-12 rounded-full border border-white/10">
                        <div class="min-w-0">
                            <h3 class="font-bold text-white truncate text-sm">
                                ${g.name} ${g.verified ? '✓' : ''}
                            </h3>
                            <span class="text-[10px] text-blue-400 font-bold uppercase">${g.activity || 'Community'}</span>
                        </div>
                    </div>
                    <div class="mb-4">
                        <span class="text-xl font-bold">${(g.members_count || 0).toLocaleString()}</span>
                        <span class="text-[10px] text-gray-500 ml-1">MEMBERS</span>
                    </div>
                    <a href="${link}" target="_blank" 
                        class="mt-auto block w-full bg-blue-600/10 hover:bg-blue-600 text-blue-500 hover:text-white text-center text-xs font-bold py-3 rounded-xl transition-all">
                        View
                    </a>
                </div>
                `;
            }).join('');
        }

        btn.addEventListener('click', search);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
        init();
    </script>
</body>
</html>
