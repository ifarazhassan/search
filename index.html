<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VK Content Manager</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent-color: #0077ff;
            --accent-hover: #0066dd;
            --success-color: #34c759;
            --error-color: #ff3b30;
            --border-color: #38383a;
            --card-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0077ff, #5856d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: 15px 25px;
            border-radius: var(--card-radius);
            text-align: center;
            min-width: 150px;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 2px solid transparent;
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3);
        }

        .mode-btn:hover:not(.active) {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Index Button */
        .index-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .index-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--accent-color), #5856d6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 119, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .index-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 119, 255, 0.5);
        }

        .index-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Controls Section */
        .controls-section {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: var(--card-radius);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .search-bar::placeholder {
            color: var(--text-secondary);
        }

        .filter-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-dropdown {
            flex: 1;
            min-width: 180px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .filter-dropdown:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .sort-dropdown {
            min-width: 200px;
        }

        .chips-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 8px 18px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .chip:hover {
            border-color: var(--accent-color);
            color: var(--text-primary);
        }

        .chip.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        /* Grid Layout */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .content-card {
            background: var(--bg-secondary);
            border-radius: var(--card-radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .content-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .card-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 3rem;
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 16px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .meta-icon {
            font-size: 1rem;
        }

        .card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-resolution {
            background: rgba(0, 119, 255, 0.2);
            color: var(--accent-color);
        }

        .badge-duration {
            background: rgba(88, 86, 214, 0.2);
            color: #5856d6;
        }

        .badge-type {
            background: rgba(52, 199, 89, 0.2);
            color: var(--success-color);
        }

        .card-text-preview {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            margin-top: 8px;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .progress-detail {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .progress-bar-container {
            width: 300px;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #5856d6);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Error Section */
        .error-section {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid var(--error-color);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .error-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .error-title {
            color: var(--error-color);
            font-weight: 600;
            display: fex;
            align-items: center;
            gap: 8px;
        }

        .error-toggle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .error-toggle.expanded {
            transform: rotate(180deg);
        }

        .error-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .error-details.expanded {
            max-height: 500px;
            margin-top: 15px;
        }

        .error-content {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--error-color);
            word-break: break-all;
            white-space: pre-wrap;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-color);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-card {
            animation: fadeIn 0.3s ease forwards;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="progress-text" id="progressText">Indexing content...</div>
        <div class="progress-detail" id="progressDetail">Preparing...</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📱 VK Content Manager</h1>
            <p>Index, filter, and manage your VK videos and posts</p>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="lastUpdated">Never</div>
                <div class="stat-label">Last Updated</div>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="video" onclick="switchMode('video')">🎬 Videos</button>
            <button class="mode-btn" data-mode="post" onclick="switchMode('post')">📝 Posts</button>
        </div>

        <!-- Index Button -->
        <div class="index-section">
            <button class="index-btn" id="indexBtn" onclick="startIndexing()">
                🔄 Index Content
            </button>
        </div>

        <!-- Controls -->
        <div class="controls-section" id="controlsSection">
            <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Search content..." oninput="applyFilters()">
            
            <div class="filter-row">
                <select class="filter-dropdown" id="typeFilter" onchange="applyFilters()">
                    <option value="">All Types</option>
                </select>
                <select class="filter-dropdown sort-dropdown" id="sortDropdown" onchange="applyFilters()">
                    <option value="newest">📅 Newest First</option>
                    <option value="oldest">📅 Oldest First</option>
                    <option value="most-engaged">🔥 Most Engaged</option>
                    <option value="least-engaged">❄️ Least Engaged</option>
                    <option value="duration-long">⏱️ Longest Duration</option>
                    <option value="duration-short">⏱️ Shortest Duration</option>
                </select>
            </div>

            <div class="chips-container" id="chipsContainer">
                <!-- Dynamic chips will be inserted here -->
            </div>
        </div>

        <!-- Error Section (Hidden by default) -->
        <div class="error-section hidden" id="errorSection">
            <div class="error-header" onclick="toggleErrorDetails()">
                <span class="error-title">⚠️ Error Occurred</span>
                <span class="error-toggle" id="errorToggle">▼</span>
            </div>
            <div class="error-details" id="errorDetails">
                <div class="error-content" id="errorContent"></div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid" id="contentGrid">
            <!-- Cards will be dynamically inserted here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="emptyState">
            <div class="empty-state-icon">📭</div>
            <h3>No Content Found</h3>
            <p>Click "Index Content" to load your VK data</p>
        </div>
    </div>

    <script>
        // Global State
        let currentMode = 'video';
        let allContent = [];
        let filteredContent = [];
        let accessToken = null;
        let userId = null;

        // Constants
        const APP_ID = 53969951;
        const MAX_ITEMS = 1000;
        const BATCH_SIZE = 50;
        const STORAGE_KEY_PREFIX = 'vk_content_';

        // Initialize VK Bridge
        async function initVKBridge() {
            try {
                await bridge.send('VKWebAppInit');
                
                // Get launch parameters
                const launchParams = new URLSearchParams(window.location.search);
                
                // Request auth token
                const authResult = await bridge.send('VKWebAppGetAuthToken', { 
                    app_id: APP_ID,
                    scope: 'video,wall,offline'
                });
                
                if (authResult.access_token) {
                    accessToken = authResult.access_token;
                    
                    // Try to get user info
                    try {
                        const userInfo = await bridge.send('VKWebAppGetUserInfo');
                        if (userInfo && userInfo.id) {
                            userId = userInfo.id;
                        }
                    } catch (e) {
                        console.log('Could not get user info:', e);
                    }
                    
                    console.log('VK Bridge initialized successfully');
                    checkCachedData();
                } else {
                    throw new Error('No access token received');
                }
            } catch (error) {
                console.error('VK Bridge initialization failed:', error);
                showError('Bridge Init Failed', error.message + '\n\nMake sure you are running this inside VK app environment.');
                
                // Demo mode for testing outside VK
                enableDemoMode();
            }
        }

        // Demo mode for testing
        function enableDemoMode() {
            console.log('Running in demo mode');
            accessToken = 'demo_token';
            userId = 'demo_user';
            
            // Generate demo data
            generateDemoData();
        }

        function generateDemoData() {
            const videoDemo = [];
            const postDemo = [];
            
            const resolutions = ['4K', '1080p', '720p', '480p', '360p'];
            const durations = ['2:34', '5:45', '12:30', '25:00', '8:15', '18:22', '3:45', '35:10'];
            const postTypes = ['text', 'photo', 'video', 'link', 'audio', 'document'];
            
            for (let i = 0; i < 50; i++) {
                // Video demos
                videoDemo.push({
                    id: `video_${i}`,
                    title: `Sample Video ${i + 1} - ${['Tutorial', 'Vlog', 'Review', 'Music', 'Gaming'][i % 5]} Content`,
                    duration: durations[i % durations.length],
                    durationSeconds: [154, 345, 750, 1500, 495, 1102, 225, 2110][i % 8],
                    views: Math.floor(Math.random() * 50000) + 100,
                    date: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString(),
                    resolution: resolutions[i % resolutions.length],
                    thumbnail: null,
                    type: 'video'
                });
                
                // Post demos
                postDemo.push({
                    id: `post_${i}`,
                    text: `This is sample post ${i + 1}. ${'Lorem ipsum dolor sit amet, consectetur adipiscing elit. '.repeat(i % 5 + 1)}`,
                    likes: Math.floor(Math.random() * 1000),
                    comments: Math.floor(Math.random() * 200),
                    reposts: Math.floor(Math.random() * 100),
                    date: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString(),
                    contentType: postTypes[i % postTypes.length],
                    type: 'post'
                });
            }
            
            localStorage.setItem(STORAGE_KEY_PREFIX + 'video', JSON.stringify({
                data: videoDemo,
                timestamp: Date.now()
            }));
            
            localStorage.setItem(STORAGE_KEY_PREFIX + 'post', JSON.stringify({
                data: postDemo,
                timestamp: Date.now()
            }));
            
            checkCachedData();
        }

        // Check cached data
        function checkCachedData() {
            const cached = localStorage.getItem(STORAGE_KEY_PREFIX + currentMode);
            if (cached) {
                const parsed = JSON.parse(cached);
                allContent = parsed.data || [];
                updateStats(parsed.timestamp);
                applyFilters();
            }
        }

        // Switch between video/post mode
        function switchMode(mode) {
            currentMode = mode;
            
            // Update UI
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            // Update filters based on mode
            updateFilterOptions();
            
            // Load cached data for this mode
            checkCachedData();
        }

        // Update filter dropdowns and chips based on mode
        function updateFilterOptions() {
            const typeFilter = document.getElementById('typeFilter');
            const sortDropdown = document.getElementById('sortDropdown');
            const chipsContainer = document.getElementById('chipsContainer');
            
            if (currentMode === 'video') {
                typeFilter.innerHTML = `
                    <option value="">All Resolutions</option>
                    <option value="4K">4K Ultra HD</option>
                    <option value="1080p">Full HD (1080p)</option>
                    <option value="720p">HD (720p)</option>
                    <option value="480p">SD (480p)</option>
                    <option value="360p">Low (360p)</option>
                `;
                
                chipsContainer.innerHTML = `
                    <span class="chip" data-filter="duration" data-value="short" onclick="toggleChip(this)">⚡ Short (&lt;5 min)</span>
                    <span class="chip" data-filter="duration" data-value="medium" onclick="toggleChip(this)">📺 Medium (5-20 min)</span>
                    <span class="chip" data-filter="duration" data-value="long" onclick="toggleChip(this)">🎬 Long (&gt;20 min)</span>
                `;
                
                sortDropdown.innerHTML = `
                    <option value="newest">📅 Newest First</option>
                    <option value="oldest">📅 Oldest First</option>
                    <option value="most-engaged">👁️ Most Views</option>
                    <option value="least-engaged">👁️ Least Views</option>
                    <option value="duration-long">⏱️ Longest Duration</option>
                    <option value="duration-short">⏱️ Shortest Duration</option>
                `;
            } else {
                typeFilter.innerHTML = `
                    <option value="">All Types</option>
                    <option value="text">Text Posts</option>
                    <option value="photo">Photo Posts</option>
                    <option value="video">Video Posts</option>
                    <option value="link">Link Posts</option>
                    <option value="audio">Audio Posts</option>
                    <option value="document">Document Posts</option>
                `;
                
                chipsContainer.innerHTML = `
                    <span class="chip" data-filter="date" data-value="week" onclick="toggleChip(this)">📅 This Week</span>
                    <span class="chip" data-filter="date" data-value="month" onclick="toggleChip(this)">📆 This Month</span>
                    <span class="chip" data-filter="date" data-value="year" onclick="toggleChip(this)">🗓️ This Year</span>
                `;
                
                sortDropdown.innerHTML = `
                    <option value="newest">📅 Newest First</option>
                    <option value="oldest">📅 Oldest First</option>
                    <option value="most-engaged">❤️ Most Liked</option>
                    <option value="least-engaged">❤️ Least Liked</option>
                    <option value="most-comments">💬 Most Comments</option>
                    <option value="least-comments">💬 Least Comments</option>
                `;
            }
        }

        // Start indexing process
        async function startIndexing() {
            showLoading(true);
            hideError();
            
            try {
                let fetchedContent = [];
                let offset = 0;
                let hasMore = true;
                
                while (hasMore && fetchedContent.length < MAX_ITEMS) {
                    updateProgress(
                        `Fetching batch ${Math.floor(offset / BATCH_SIZE) + 1}...`,
                        `${fetchedContent.length} items loaded`
                    );
                    
                    let result;
                    if (currentMode === 'video') {
                        result = await fetchVideos(offset, BATCH_SIZE);
                    } else {
                        result = await fetchPosts(offset, BATCH_SIZE);
                    }
                    
                    if (result.items && result.items.length > 0) {
                        fetchedContent = fetchedContent.concat(result.items);
                        offset += BATCH_SIZE;
                        
                        // Check if we got fewer items than requested
                        if (result.items.length < BATCH_SIZE) {
                            hasMore = false;
                        }
                    } else {
                        hasMore = false;
                    }
                    
                    // Small delay to avoid rate limiting
                    await sleep(100);
                    
                    updateProgress(
                        `Processing...`,
                        `${fetchedContent.length} items collected`,
                        Math.min((fetchedContent.length / MAX_ITEMS) * 100, 99)
                    );
                }
                
                // Cache the results
                allContent = fetchedContent;
                localStorage.setItem(STORAGE_KEY_PREFIX + currentMode, JSON.stringify({
                    data: allContent,
                    timestamp: Date.now()
                }));
                
                updateProgress('Complete!', `${allContent.length} items indexed`, 100);
                
                setTimeout(() => {
                    showLoading(false);
                    updateStats(Date.now());
                    applyFilters();
                }, 500);
                
            } catch (error) {
                showLoading(false);
                showError('Indexing Failed', error.message || JSON.stringify(error));
            }
        }

        // Fetch videos using VK API
        async function fetchVideos(offset, count) {
            try {
                const result = await bridge.send('VKWebAppCallAPIMethod', {
                    method: 'fave.get',
                    params: {
                        access_token: accessToken,
                        item_type: 'video',
                        offset: offset,
                        count: count,
                        v: '5.131'
                    }
                });
                
                if (result.response) {
                    return {
                        items: result.response.items.map(video => ({
                            id: video.id,
                            title: video.title || 'Untitled Video',
                            duration: formatDuration(video.duration),
                            durationSeconds: video.duration || 0,
                            views: video.views || 0,
                            date: new Date((video.date || 0) * 1000).toISOString(),
                            resolution: getResolution(video.width, video.height),
                            thumbnail: video.photo_800 || video.photo_320 || null,
                            type: 'video'
                        }))
                    };
                }
                
                throw new Error(result.error?.error_msg || 'Failed to fetch videos');
            } catch (error) {
                // If API fails, use demo data
                if (accessToken === 'demo_token') {
                    const demoData = JSON.parse(localStorage.getItem(STORAGE_KEY_PREFIX + 'video'));
                    return {
                        items: (demoData?.data || []).slice(offset, offset + count)
                    };
                }
                throw error;
            }
        }

        // Fetch posts using VK API
        async function fetchPosts(offset, count) {
            try {
                const result = await bridge.send('VKWebAppCallAPIMethod', {
                    method: 'newsfeed.get',
                    params: {
                        access_token: accessToken,
                        filters: 'post',
                        offset: offset,
                        count: count,
                        v: '5.131'
                    }
                });
                
                if (result.response) {
                    return {
                        items: result.response.items.map(post => ({
                            id: post.id,
                            text: post.text || '',
                            likes: post.likes?.count || 0,
                            comments: post.comments?.count || 0,
                            reposts: post.reposts?.count || 0,
                            date: new Date((post.date || 0) * 1000).toISOString(),
                            contentType: getPostContentType(post),
                            type: 'post'
                        }))
                    };
                }
                
                throw new Error(result.error?.error_msg || 'Failed to fetch posts');
            } catch (error) {
                // If API fails, use demo data
                if (accessToken === 'demo_token') {
                    const demoData = JSON.parse(localStorage.getItem(STORAGE_KEY_PREFIX + 'post'));
                    return {
                        items: (demoData?.data || []).slice(offset, offset + count)
                    };
                }
                throw error;
            }
        }

        // Helper functions
        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            
            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function getResolution(width, height) {
            if (!width || !height) return 'Unknown';
            const min = Math.min(width, height);
            
            if (min >= 2160) return '4K';
            if (min >= 1080) return '1080p';
            if (min >= 720) return '720p';
            if (min >= 480) return '480p';
            if (min >= 360) return '360p';
            return 'SD';
        }

        function getPostContentType(post) {
            if (post.attachments && post.attachments.length > 0) {
                return post.attachments[0].type || 'text';
            }
            return post.text ? 'text' : 'unknown';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Apply filters and search
        function applyFilters() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const typeValue = document.getElementById('typeFilter').value;
            const sortValue = document.getElementById('sortDropdown').value;
            
            // Get active chips
            const activeChips = Array.from(document.querySelectorAll('.chip.active'))
                .map(chip => ({ filter: chip.dataset.filter, value: chip.dataset.value }));
            
            // Filter content
            filteredContent = allContent.filter(item => {
                // Search filter
                if (searchTerm) {
                    const searchableText = currentMode === 'video' 
                        ? item.title 
                        : item.text;
                    if (!searchableText.toLowerCase().includes(searchTerm)) {
                        return false;
                    }
                }
                
                // Type/Resolution filter
                if (typeValue) {
                    if (currentMode === 'video' && item.resolution !== typeValue) {
                        return false;
                    }
                    if (currentMode === 'post' && item.contentType !== typeValue) {
                        return false;
                    }
                }
                
                // Chip filters
                for (const chip of activeChips) {
                    if (chip.filter === 'duration') {
                        if (chip.value === 'short' && item.durationSeconds >= 300) return false;
                        if (chip.value === 'medium' && (item.durationSeconds < 300 || item.durationSeconds > 1200)) return false;
                        if (chip.value === 'long' && item.durationSeconds <= 1200) return false;
                    }
                    
                    if (chip.filter === 'date') {
                        const itemDate = new Date(item.date);
                        const now = new Date();
                        
                        if (chip.value === 'week' && (now - itemDate) > 7 * 24 * 60 * 60 * 1000) return false;
                        if (chip.value === 'month' && (now - itemDate) > 30 * 24 * 60 * 60 * 1000) return false;
                        if (chip.value === 'year' && (now - itemDate) > 365 * 24 * 60 * 60 * 1000) return false;
                    }
                }
                
                return true;
            });
            
            // Sort content
            sortContent(sortValue);
            
            // Render
            renderContent();
        }

        function sortContent(sortValue) {
            switch (sortValue) {
                case 'newest':
                    filteredContent.sort((a, b) => new Date(b.date) - new Date(a.date));
                    break;
                case 'oldest':
                    filteredContent.sort((a, b) => new Date(a.date) - new Date(b.date));
                    break;
                case 'most-engaged':
                    if (currentMode === 'video') {
                        filteredContent.sort((a, b) => b.views - a.views);
                    } else {
                        filteredContent.sort((a, b) => b.likes - a.likes);
                    }
                    break;
                case 'least-engaged':
                    if (currentMode === 'video') {
                        filteredContent.sort((a, b) => a.views - b.views);
                    } else {
                        filteredContent.sort((a, b) => a.likes - b.likes);
                    }
                    break;
                case 'duration-long':
                    filteredContent.sort((a, b) => (b.durationSeconds || 0) - (a.durationSeconds || 0));
                    break;
                case 'duration-short':
                    filteredContent.sort((a, b) => (a.durationSeconds || 0) - (b.durationSeconds || 0));
                    break;
                case 'most-comments':
                    filteredContent.sort((a, b) => (b.comments || 0) - (a.comments || 0));
                    break;
                case 'least-comments':
                    filteredContent.sort((a, b) => (a.comments || 0) - (b.comments || 0));
                    break;
            }
        }

        // Toggle chip selection
        function toggleChip(chip) {
            chip.classList.toggle('active');
            applyFilters();
        }

        // Render content cards
        function renderContent() {
            const grid = document.getElementById('contentGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (filteredContent.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            grid.innerHTML = filteredContent.map(item => {
                if (currentMode === 'video') {
                    return createVideoCard(item);
                } else {
                    return createPostCard(item);
                }
            }).join('');
        }

        function createVideoCard(item) {
            const thumbnailHtml = item.thumbnail 
                ? `<img src="${item.thumbnail}" alt="${item.title}" onerror="this.parentElement.innerHTML='🎬'">` 
                : '🎬';
            
            return `
                <div class="content-card">
                    <div class="card-thumbnail">${thumbnailHtml}</div>
                    <div class="card-body">
                        <div class="card-title">${escapeHtml(item.title)}</div>
                        <div class="card-meta">
                            <span class="meta-item"><span class="meta-icon">👁️</span> ${formatNumber(item.views)}</span>
                            <span class="meta-item"><span class="meta-icon">⏱️</span> ${item.duration}</span>
                        </div>
                        <div class="card-badges">
                            <span class="badge badge-resolution">${item.resolution}</span>
                            <span class="badge badge-duration">${getDurationCategory(item.durationSeconds)}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function createPostCard(item) {
            const iconMap = {
                text: '📝',
                photo: '🖼️',
                video: '🎬',
                link: '🔗',
                audio: '🎵',
                document: '📄'
            };
            
            return `
                <div class="content-card">
                    <div class="card-thumbnail" style="background: linear-gradient(135deg, #1c1c1e, #2c2c2e); font-size: 4rem;">
                        ${iconMap[item.contentType] || '📝'}
                    </div>
                    <div class="card-body">
                        <div class="card-text-preview">${escapeHtml(item.text)}</div>
                        <div class="card-meta" style="margin-top: 12px;">
                            <span class="meta-item"><span class="meta-icon">❤️</span> ${formatNumber(item.likes)}</span>
                            <span class="meta-item"><span class="meta-icon">💬</span> ${formatNumber(item.comments)}</span>
                            <span class="meta-item"><span class="meta-icon">🔄</span> ${formatNumber(item.reposts)}</span>
                        </div>
                        <div class="card-badges">
                            <span class="badge badge-type">${item.contentType}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function getDurationCategory(seconds) {
            if (!seconds) return 'Unknown';
            if (seconds < 300) return 'Short';
            if (seconds <= 1200) return 'Medium';
            return 'Long';
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Update stats display
        function updateStats(timestamp) {
            document.getElementById('totalCount').textContent = allContent.length;
            
            if (timestamp) {
                const date = new Date(timestamp);
                document.getElementById('lastUpdated').textContent = date.toLocaleTimeString([], { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
            }
        }

        // Loading overlay controls
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const btn = document.getElementById('indexBtn');
            
            if (show) {
                overlay.classList.remove('hidden');
                btn.disabled = true;
            } else {
                overlay.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function updateProgress(text, detail, percent = 0) {
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressDetail').textContent = detail;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        // Error handling
        function showError(title, details) {
            const section = document.getElementById('errorSection');
            const content = document.getElementById('errorContent');
            
            section.classList.remove('hidden');
            content.textContent = `${title}\n\n${details}`;
        }

        function hideError() {
            document.getElementById('errorSection').classList.add('hidden');
        }

        function toggleErrorDetails() {
            const details = document.getElementById('errorDetails');
            const toggle = document.getElementById('errorToggle');
            
            details.classList.toggle('expanded');
            toggle.classList.toggle('expanded');
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            initVKBridge();
            updateFilterOptions();
        });
    </script>
</body>
</html>
