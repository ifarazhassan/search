<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Group Discovery Engine</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1c1c1e; }
        ::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #48484a; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .group-card:hover { transform: translateY(-4px); border-color: #2D81E0; }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <header class="mb-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-white">VK Group Discovery</h1>
                    <p class="text-gray-400 mt-2">Search, index, and analyze VK communities</p>
                </div>
                <div class="bg-[#1c1c1e] rounded-xl p-4 min-w-[200px] border border-gray-800">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-400 text-sm">Total Indexed</p>
                            <p id="group-count" class="text-2xl font-semibold">0</p>
                        </div>
                        <div class="text-right">
                            <p class="text-gray-400 text-sm">Last Update</p>
                            <p id="last-updated" class="text-sm font-medium text-blue-400">Never</p>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="bg-[#1c1c1e] rounded-2xl p-6 mb-8 shadow-2xl border border-gray-800">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                <div class="flex-1 max-w-2xl">
                    <div class="relative">
                        <input id="search-input" type="text" placeholder="Enter keywords (e.g. Technology, Gaming, News)..." class="w-full bg-black border border-gray-800 rounded-xl py-4 px-4 pl-12 text-white placeholder-gray-500 focus:outline-none focus:border-blue-600 transition-all">
                        <svg class="w-5 h-5 text-gray-500 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="index-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl flex items-center gap-3 transition-all active:scale-95 disabled:opacity-50">
                        <svg id="index-spinner" class="w-5 h-5 hidden spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        <span id="index-text">Index Groups</span>
                    </button>
                    <button id="clear-btn" class="bg-gray-800 hover:bg-red-900/40 hover:text-red-400 text-gray-300 font-medium py-4 px-6 rounded-xl transition-all">Clear</button>
                </div>
            </div>
            
            <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-6 pt-6 border-t border-gray-800">
                <div>
                    <label class="block text-gray-400 text-xs uppercase tracking-wider font-bold mb-2">Member Count Range</label>
                    <select id="size-filter" class="w-full bg-black border border-gray-800 rounded-xl py-3 px-4 text-white focus:border-blue-600 outline-none">
                        <option value="all">Any Size</option>
                        <option value="huge">Massive (1M+ members)</option>
                        <option value="large">Large (100k - 1M)</option>
                        <option value="medium">Medium (10k - 100k)</option>
                        <option value="small">Small (< 10k)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-400 text-xs uppercase tracking-wider font-bold mb-2">Group Status</label>
                    <div class="flex gap-2">
                        <button data-status="all" class="status-chip active-chip bg-blue-600 text-white py-2.5 px-4 rounded-xl text-sm transition-all flex-1">All</button>
                        <button data-status="verified" class="status-chip bg-gray-800 text-gray-400 py-2.5 px-4 rounded-xl text-sm transition-all flex-1">Verified</button>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-400 text-xs uppercase tracking-wider font-bold mb-2">Sort Order</label>
                    <select id="sort-options" class="w-full bg-black border border-gray-800 rounded-xl py-3 px-4 text-white focus:border-blue-600 outline-none">
                        <option value="members-desc">Most Members</option>
                        <option value="members-asc">Least Members</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="groups-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-12">
            <div id="empty-state" class="col-span-full text-center py-16">
                <div class="bg-[#1c1c1e] border border-gray-800 rounded-3xl p-12 max-w-2xl mx-auto">
                    <div class="w-20 h-20 bg-gray-900 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-bold text-white mb-3">No Groups Indexed</h3>
                    <p class="text-gray-400 mb-8">Enter a keyword above to start searching and indexing VK communities.</p>
                </div>
            </div>
        </div>

        <div id="loading-overlay" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden backdrop-blur-sm">
            <div class="bg-[#1c1c1e] border border-gray-800 rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl">
                <div class="flex items-center justify-center mb-6">
                    <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full spinner"></div>
                </div>
                <h3 class="text-2xl font-bold text-white text-center mb-2">Indexing VK</h3>
                <p id="loading-message" class="text-gray-400 text-center mb-8">Fetching community data...</p>
                <div class="mb-6">
                    <div class="flex justify-between text-sm font-bold text-gray-400 mb-2">
                        <span class="uppercase tracking-widest">Progress</span>
                        <span id="loading-progress">0%</span>
                    </div>
                    <div class="w-full bg-gray-900 rounded-full h-3 overflow-hidden border border-gray-800">
                        <div id="loading-bar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <div class="text-center bg-black/40 py-3 rounded-xl border border-gray-800">
                    <p id="loading-stats" class="text-blue-400 font-mono text-sm font-bold">Groups: 0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const APP_CONFIG = {
            APP_ID: 51765279, // Replace with your App ID
            API_VERSION: '5.131',
            MAX_ITEMS: 500,
            BATCH_SIZE: 100,
            STORAGE_KEY: 'vk_group_discovery_data'
        };

        let allGroups = [];
        let activeStatusFilter = 'all';

        const indexBtn = document.getElementById('index-btn');
        const indexText = document.getElementById('index-text');
        const indexSpinner = document.getElementById('index-spinner');
        const searchInput = document.getElementById('search-input');
        const groupsContainer = document.getElementById('groups-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingBar = document.getElementById('loading-bar');
        const loadingProgress = document.getElementById('loading-progress');
        const loadingStats = document.getElementById('loading-stats');

        async function initBridge() {
            try {
                await vkBridge.send('VKWebAppInit');
                loadCache();
            } catch (e) {
                console.error("Bridge init failed", e);
            }
        }

        function loadCache() {
            const cached = localStorage.getItem(APP_CONFIG.STORAGE_KEY);
            if (cached) {
                allGroups = JSON.parse(cached);
                renderGroups();
                updateStats();
            }
        }

        async function performIndex() {
            const query = searchInput.value.trim();
            if (!query) {
                alert("Please enter a search term");
                return;
            }

            indexBtn.disabled = true;
            indexSpinner.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden');
            
            let fetched = [];
            let offset = 0;

            try {
                const { access_token } = await vkBridge.send('VKWebAppGetAuthToken', { 
                    app_id: APP_CONFIG.APP_ID, 
                    scope: 'groups' 
                });

                while (offset < APP_CONFIG.MAX_ITEMS) {
                    const response = await vkBridge.send('VKWebAppCallAPIMethod', {
                        method: 'groups.search',
                        params: {
                            q: query,
                            count: APP_CONFIG.BATCH_SIZE,
                            offset: offset,
                            extended: 1,
                            fields: 'members_count,activity,verified,description',
                            v: APP_CONFIG.API_VERSION,
                            access_token
                        }
                    });

                    const items = response.items || [];
                    if (items.length === 0) break;

                    fetched = [...fetched, ...items];
                    offset += APP_CONFIG.BATCH_SIZE;

                    const progress = Math.round((fetched.length / APP_CONFIG.MAX_ITEMS) * 100);
                    loadingBar.style.width = `${progress}%`;
                    loadingProgress.innerText = `${progress}%`;
                    loadingStats.innerText = `Found: ${fetched.length}`;

                    if (items.length < APP_CONFIG.BATCH_SIZE) break;
                }

                allGroups = fetched;
                localStorage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify(allGroups));
                localStorage.setItem('vk_last_update', Date.now());
                
                renderGroups();
                updateStats();
                
            } catch (err) {
                console.error(err);
                alert("Search failed. Check console for details.");
            } finally {
                loadingOverlay.classList.add('hidden');
                indexBtn.disabled = false;
                indexSpinner.classList.add('hidden');
            }
        }

        function renderGroups() {
            const sizeFilter = document.getElementById('size-filter').value;
            const sortVal = document.getElementById('sort-options').value;

            let filtered = allGroups.filter(g => {
                const members = g.members_count || 0;
                const matchesStatus = activeStatusFilter === 'all' || (activeStatusFilter === 'verified' && g.verified);
                
                let matchesSize = true;
                if (sizeFilter === 'huge') matchesSize = members >= 1000000;
                else if (sizeFilter === 'large') matchesSize = members >= 100000 && members < 1000000;
                else if (sizeFilter === 'medium') matchesSize = members >= 10000 && members < 100000;
                else if (sizeFilter === 'small') matchesSize = members < 10000;

                return matchesStatus && matchesSize;
            });

            if (sortVal === 'members-desc') filtered.sort((a, b) => b.members_count - a.members_count);
            else if (sortVal === 'members-asc') filtered.sort((a, b) => a.members_count - b.members_count);
            else if (sortVal === 'alphabetical') filtered.sort((a, b) => a.name.localeCompare(b.name));

            if (filtered.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                groupsContainer.innerHTML = '';
                groupsContainer.appendChild(document.getElementById('empty-state'));
                return;
            }

            document.getElementById('empty-state').classList.add('hidden');
            groupsContainer.innerHTML = filtered.map(group => `
                <div class="group-card bg-[#1c1c1e] border border-gray-800 rounded-2xl p-5 transition-all duration-300 hover:shadow-2xl">
                    <div class="flex items-center gap-4 mb-4">
                        <img src="${group.photo_100}" class="w-14 h-14 rounded-full border-2 border-gray-700 shadow-lg">
                        <div class="overflow-hidden">
                            <h3 class="font-bold text-white truncate flex items-center gap-1">
                                ${group.name}
                                ${group.verified ? '<svg class="w-4 h-4 text-blue-500 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                            </h3>
                            <p class="text-xs text-gray-500 uppercase font-bold tracking-tighter">${group.activity || 'Community'}</p>
                        </div>
                    </div>
                    <div class="bg-black/40 rounded-xl p-3 mb-4">
                        <p class="text-2xl font-bold text-blue-500">${(group.members_count || 0).toLocaleString()}</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Members</p>
                    </div>
                    <p class="text-gray-400 text-sm line-clamp-2 mb-4 h-10 leading-relaxed">${group.description || 'No description provided.'}</p>
                    <button onclick="window.open('https://vk.com/${group.screen_name || 'public'+group.id}', '_blank')" class="w-full bg-gray-800 hover:bg-blue-600 text-white text-sm font-bold py-3 rounded-xl transition-colors">
                        View Community
                    </button>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('group-count').innerText = allGroups.length;
            const last = localStorage.getItem('vk_last_update');
            if (last) {
                const date = new Date(parseInt(last));
                document.getElementById('last-updated').innerText = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
        }

        // Listeners
        indexBtn.addEventListener('click', performIndex);
        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm('Clear all indexed data?')) {
                localStorage.removeItem(APP_CONFIG.STORAGE_KEY);
                allGroups = [];
                renderGroups();
                updateStats();
            }
        });

        document.querySelectorAll('.status-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                document.querySelectorAll('.status-chip').forEach(c => c.classList.remove('bg-blue-600', 'text-white'));
                document.querySelectorAll('.status-chip').forEach(c => c.classList.add('bg-gray-800', 'text-gray-400'));
                e.target.classList.remove('bg-gray-800', 'text-gray-400');
                e.target.classList.add('bg-blue-600', 'text-white');
                activeStatusFilter = e.target.dataset.status;
                renderGroups();
            });
        });

        document.getElementById('size-filter').addEventListener('change', renderGroups);
        document.getElementById('sort-options').addEventListener('change', renderGroups);

        initBridge();
    </script>
</body>
</html>
