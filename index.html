<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Community Search</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .card { background: #111; border: 1px solid #222; transition: 0.2s; }
        .card:hover { border-color: #3b82f6; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Discovery</h1>

        <div class="flex gap-2 mb-10">
            <input type="text" id="query" placeholder="Enter keywords..." class="flex-1 bg-[#111] border border-[#222] rounded-xl p-4 text-white focus:outline-none focus:border-blue-500">
            <button id="searchBtn" class="bg-blue-600 px-8 rounded-xl font-bold hover:bg-blue-500 transition-colors">Search</button>
        </div>

        <div id="status" class="text-gray-500 text-sm mb-4 uppercase tracking-widest font-bold">Ready</div>
        
        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const APP_ID = 53969951;
        let token = null;

        async function init() {
            try { await vkBridge.send('VKWebAppInit'); } catch(e) {}
        }

        async function performSearch(query, searchType = 'group,page') {
            return await vkBridge.send('VKWebAppCallAPIMethod', {
                method: 'groups.search',
                params: {
                    q: query,
                    count: 30,
                    extended: 1,
                    type: searchType, // Try the specified types
                    safe_searching: 0,
                    fields: 'members_count,activity,description',
                    v: '5.131',
                    access_token: token
                }
            });
        }

        async function handleSearch() {
            const q = document.getElementById('query').value.trim();
            if (!q) return;

            const btn = document.getElementById('searchBtn');
            const resDiv = document.getElementById('results');
            btn.disabled = true;
            resDiv.style.opacity = '0.5';

            try {
                if (!token) {
                    const auth = await vkBridge.send('VKWebAppGetAuthToken', { app_id: APP_ID, scope: 'groups' });
                    token = auth.access_token;
                }

                let response;
                try {
                    // Try 1: Search with both Group and Page
                    response = await performSearch(q, 'group,page');
                } catch (e) {
                    // Fallback: If "invalid type" error occurs, search without the type parameter
                    console.warn("Retrying without type parameter...");
                    response = await performSearch(q, ''); 
                }

                const items = response.response?.items || response.items || [];
                render(items);
                document.getElementById('status').innerText = `Found ${items.length} communities`;

            } catch (err) {
                alert("Critical Error: " + (err.error_data?.error_msg || err.message));
            } finally {
                btn.disabled = false;
                resDiv.style.opacity = '1';
            }
        }

        function render(items) {
            const container = document.getElementById('results');
            if (items.length === 0) {
                container.innerHTML = '<p class="text-gray-600">No results found.</p>';
                return;
            }

            container.innerHTML = items.map(g => `
                <div class="card p-5 rounded-2xl flex flex-col">
                    <div class="flex items-center gap-4 mb-4">
                        <img src="${g.photo_100}" class="w-12 h-12 rounded-full shadow-lg">
                        <div class="overflow-hidden">
                            <h3 class="font-bold truncate text-sm">${g.name}</h3>
                            <span class="text-[10px] text-blue-400 font-bold uppercase">${g.activity || 'Community'}</span>
                        </div>
                    </div>
                    <div class="text-xl font-black mb-4">${(g.members_count || 0).toLocaleString()} <span class="text-xs text-gray-500 font-normal">Members</span></div>
                    <a href="https://vk.com/${g.screen_name || 'public'+g.id}" target="_blank" class="mt-auto block w-full bg-blue-600/10 text-blue-500 text-center py-3 rounded-xl font-bold text-xs hover:bg-blue-600 hover:text-white transition-all">VIEW</a>
                </div>
            `).join('');
        }

        document.getElementById('searchBtn').addEventListener('click', handleSearch);
        document.getElementById('query').addEventListener('keypress', e => e.key === 'Enter' && handleSearch());
        init();
    </script>
</body>
</html>
