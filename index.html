<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Community Finder</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #000; color: #fff; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1c1c1e; }
        ::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 4px; }
        .group-card { background: #1c1c1e; border: 1px solid #2c2c2e; transition: all 0.2s ease; }
        .group-card:hover { border-color: #2D81E0; transform: translateY(-2px); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Community Finder</h1>
                <p class="text-gray-500 text-sm mt-1">Search millions of VK groups and pages in real-time</p>
            </div>
            <div id="status-badge" class="hidden md:flex items-center gap-2 bg-blue-500/10 border border-blue-500/20 px-3 py-1.5 rounded-full">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <span class="text-blue-500 text-xs font-bold uppercase tracking-widest">Live API Connection</span>
            </div>
        </header>

        <div class="relative group mb-8">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-500 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text" id="search-input" 
                placeholder="What are you looking for? (e.g. Photography, Moscow, Indie Rock)" 
                class="block w-full bg-[#1c1c1e] border border-[#2c2c2e] rounded-2xl py-5 pl-14 pr-32 text-lg focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all placeholder-gray-600 shadow-2xl">
            <button id="search-btn" class="absolute right-3 top-2.5 bottom-2.5 bg-blue-600 hover:bg-blue-700 text-white px-6 rounded-xl font-bold transition-all active:scale-95 flex items-center gap-2">
                <svg id="loading-icon" class="hidden w-4 h-4 spinner" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span>Search</span>
            </button>
        </div>

        <div class="flex flex-wrap items-center justify-between gap-4 mb-8 text-sm">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="text-gray-500">Showing:</span>
                    <span id="results-count" class="font-mono font-bold text-blue-500">0 results</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <label class="text-gray-500">Order by:</label>
                <select id="sort-order" class="bg-transparent border-none text-white font-bold focus:ring-0 cursor-pointer">
                    <option value="0">Default</option>
                    <option value="6">Member Count</option>
                    <option value="1">Relevance</option>
                </select>
            </div>
        </div>

        <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            <div id="empty-state" class="col-span-full py-20 text-center border-2 border-dashed border-[#1c1c1e] rounded-3xl">
                <p class="text-gray-600 text-lg">Type something above to explore VK communities</p>
            </div>
        </div>
    </div>

    <script>
        const APP_ID = 53969951; // Default ID, change if needed
        let accessToken = null;

        const input = document.getElementById('search-input');
        const btn = document.getElementById('search-btn');
        const grid = document.getElementById('results-grid');
        const countDisplay = document.getElementById('results-count');
        const loader = document.getElementById('loading-icon');
        const sortSelect = document.getElementById('sort-order');

        async function init() {
            try {
                await vkBridge.send('VKWebAppInit');
                document.getElementById('status-badge').classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        async function search() {
            const query = input.value.trim();
            if (!query) return;

            // UI Loading State
            btn.disabled = true;
            loader.classList.remove('hidden');
            grid.style.opacity = '0.5';

            try {
                if (!accessToken) {
                    const auth = await vkBridge.send('VKWebAppGetAuthToken', { 
                        app_id: APP_ID, 
                        scope: 'groups' 
                    });
                    accessToken = auth.access_token;
                }

                const data = await vkBridge.send('VKWebAppCallAPIMethod', {
                    method: 'groups.search',
                    params: {
                        q: query,
                        count: 40,
                        extended: 1,
                        sort: sortSelect.value,
                        fields: 'members_count,activity,verified,description',
                        v: '5.131',
                        access_token: accessToken
                    }
                });

                render(data.items || []);
            } catch (err) {
                console.error(err);
                alert("API Error: Check console for details.");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                grid.style.opacity = '1';
            }
        }

        function render(groups) {
            countDisplay.innerText = `${groups.length} results`;
            
            if (groups.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">No communities found for "${input.value}"</div>`;
                return;
            }

            grid.innerHTML = groups.map(g => `
                <div class="group-card rounded-2xl p-5 flex flex-col">
                    <div class="flex items-start gap-4 mb-4">
                        <img src="${g.photo_100}" class="w-12 h-12 rounded-full shadow-lg">
                        <div class="min-w-0">
                            <h3 class="font-bold text-white truncate flex items-center gap-1">
                                ${g.name}
                                ${g.verified ? '<svg class="w-4 h-4 text-blue-500 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                            </h3>
                            <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest">${g.activity || 'Community'}</p>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <span class="text-xl font-bold text-white">${(g.members_count || 0).toLocaleString()}</span>
                        <span class="text-xs text-gray-500 ml-1">followers</span>
                    </div>

                    <p class="text-gray-400 text-xs line-clamp-2 mb-6 h-8 leading-relaxed italic">
                        ${g.description ? g.description : 'No description provided.'}
                    </p>

                    <button onclick="window.open('https://vk.com/${g.screen_name || 'public'+g.id}', '_blank')" 
                        class="mt-auto w-full bg-white/5 hover:bg-blue-600 text-white text-xs font-bold py-3 rounded-xl transition-all border border-white/5 hover:border-blue-500">
                        View Community
                    </button>
                </div>
            `).join('');
        }

        // Events
        btn.addEventListener('click', search);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });
        sortSelect.addEventListener('change', search);

        init();
    </script>
</body>
</html>
