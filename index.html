<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VK Content Manager</title>
    <!-- Try multiple CDN sources for reliability -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge@2.7.0/dist/browser.min.js" 
            onerror="loadFallbackBridge()" 
            crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent-color: #0077ff;
            --accent-hover: #0066dd;
            --success-color: #34c759;
            --error-color: #ff3b30;
            --warning-color: #ff9500;
            --border-color: #38383a;
            --card-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0077ff, #5856d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Connection Status Banner */
        .connection-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 2000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        .connection-banner.show {
            transform: translateY(0);
        }

        .connection-banner.offline {
            background: var(--error-color);
            color: white;
        }

        .connection-banner.warning {
            background: var(--warning-color);
            color: black;
        }

        .connection-banner.success {
            background: var(--success-color);
            color: white;
        }

        .connection-banner + .container {
            margin-top: 60px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: 15px 25px;
            border-radius: var(--card-radius);
            text-align: center;
            min-width: 150px;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 2px solid transparent;
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3);
        }

        .mode-btn:hover:not(.active) {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Index Button */
        .index-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .index-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--accent-color), #5856d6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 119, 255, 0.4);
        }

        .index-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 119, 255, 0.5);
        }

        .index-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .demo-btn {
            padding: 16px 40px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .demo-btn:hover {
            border-color: var(--warning-color);
            color: var(--warning-color);
        }

        /* Controls Section */
        .controls-section {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: var(--card-radius);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .search-bar::placeholder {
            color: var(--text-secondary);
        }

        .filter-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-dropdown {
            flex: 1;
            min-width: 180px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .filter-dropdown:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .sort-dropdown {
            min-width: 200px;
        }

        .chips-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 8px 18px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .chip:hover {
            border-color: var(--accent-color);
            color: var(--text-primary);
        }

        .chip.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        /* Grid Layout */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .content-card {
            background: var(--bg-secondary);
            border-radius: var(--card-radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .content-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .card-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 3rem;
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 16px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .meta-icon {
            font-size: 1rem;
        }

        .card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-resolution {
            background: rgba(0, 119, 255, 0.2);
            color: var(--accent-color);
        }

        .badge-duration {
            background: rgba(88, 86, 214, 0.2);
            color: #5856d6;
        }

        .badge-type {
            background: rgba(52, 199, 89, 0.2);
            color: var(--success-color);
        }

        .card-text-preview {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            margin-top: 8px;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .progress-detail {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .progress-bar-container {
            width: 300px;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #5856d6);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .retry-btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: var(--accent-color);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Error Section */
        .error-section {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid var(--error-color);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .error-section.hidden {
            display: none;
        }

        .error-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .error-title {
            color: var(--error-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-toggle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .error-toggle.expanded {
            transform: rotate(180deg);
        }

        .error-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .error-details.expanded {
            max-height: 500px;
            margin-top: 15px;
        }

        .error-content {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--error-color);
            word-break: break-all;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state.hidden {
            display: none;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        .empty-state button {
            margin-top: 15px;
        }

        /* Network Status Indicator */
        .network-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .network-status.online {
            background: rgba(52, 199, 89, 0.2);
            color: var(--success-color);
        }

        .network-status.offline {
            background: rgba(255, 59, 48, 0.2);
            color: var(--error-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-color);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-card {
            animation: fadeIn 0.3s ease forwards;
        }

        /* Debug Info Panel */
        .debug-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 15px;
            max-width: 350px;
            font-size: 0.8rem;
            z-index: 999;
            max-height: 300px;
            overflow-y: auto;
        }

        .debug-panel.hidden {
            display: none;
        }

        .debug-panel h4 {
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .debug-item {
            margin-bottom: 8px;
            word-break: break-all;
        }

        .debug-label {
            color: var(--text-secondary);
        }

        .debug-value {
            color: var(--text-primary);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <!-- Connection Status Banner -->
    <div class="connection-banner" id="connectionBanner">
        <span id="bannerText"></span>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="progress-text" id="progressText">Initializing...</div>
        <div class="progress-detail" id="progressDetail">Please wait</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
        </div>
        <button class="retry-btn hidden" id="retryBtn" onclick="retryOperation()">🔄 Retry</button>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📱 VK Content Manager</h1>
            <p>Index, filter, and manage your VK videos and posts</p>
            <div style="margin-top: 15px;">
                <span class="network-status online" id="networkStatus">
                    <span class="status-dot"></span>
                    <span id="networkStatusText">Online</span>
                </span>
                <span style="margin-left: 10px; color: var(--text-secondary); font-size: 0.85rem;" id="bridgeStatus"></span>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="lastUpdated">Never</div>
                <div class="stat-label">Last Updated</div>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="video" onclick="switchMode('video')">🎬 Videos</button>
            <button class="mode-btn" data-mode="post" onclick="switchMode('post')">📝 Posts</button>
        </div>

        <!-- Index Button -->
        <div class="index-section">
            <button class="index-btn" id="indexBtn" onclick="startIndexing()">
                🔄 Index Content
            </button>
            <button class="demo-btn" id="demoBtn" onclick="enableDemoMode()">
                🎮 Load Demo Data
            </button>
        </div>

        <!-- Controls -->
        <div class="controls-section" id="controlsSection">
            <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Search content..." oninput="applyFilters()">
            
            <div class="filter-row">
                <select class="filter-dropdown" id="typeFilter" onchange="applyFilters()">
                    <option value="">All Types</option>
                </select>
                <select class="filter-dropdown sort-dropdown" id="sortDropdown" onchange="applyFilters()">
                    <option value="newest">📅 Newest First</option>
                    <option value="oldest">📅 Oldest First</option>
                    <option value="most-engaged">🔥 Most Engaged</option>
                    <option value="least-engaged">❄️ Least Engaged</option>
                    <option value="duration-long">⏱️ Longest Duration</option>
                    <option value="duration-short">⏱️ Shortest Duration</option>
                </select>
            </div>

            <div class="chips-container" id="chipsContainer">
                <!-- Dynamic chips will be inserted here -->
            </div>
        </div>

        <!-- Error Section (Hidden by default) -->
        <div class="error-section hidden" id="errorSection">
            <div class="error-header" onclick="toggleErrorDetails()">
                <span class="error-title">⚠️ Error Occurred</span>
                <span class="error-toggle" id="errorToggle">▼</span>
            </div>
            <div class="error-details" id="errorDetails">
                <div class="error-content" id="errorContent"></div>
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid" id="contentGrid">
            <!-- Cards will be dynamically inserted here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="emptyState">
            <div class="empty-state-icon">📭</div>
            <h3>No Content Found</h3>
            <p>Click "Index Content" to load your VK data, or try "Load Demo Data"</p>
        </div>
    </div>

    <!-- Debug Panel (toggle with ?debug=1 in URL) -->
    <div class="debug-panel hidden" id="debugPanel">
        <h4>🔧 Debug Info</h4>
        <div id="debugContent"></div>
    </div>

    <script>
        // ============================================
        // GLOBAL STATE & CONFIGURATION
        // ============================================
        
        const CONFIG = {
            APP_ID: 53969951,
            MAX_ITEMS: 1000,
            BATCH_SIZE: 50,
            STORAGE_KEY_PREFIX: 'vk_content_',
            RETRY_DELAY: 2000,
            MAX_RETRIES: 3,
            TIMEOUT_MS: 10000
        };

        let state = {
            currentMode: 'video',
            allContent: [],
            filteredContent: [],
            accessToken: null,
            userId: null,
            isOnline: navigator.onLine,
            bridgeAvailable: false,
            isDemoMode: false,
            currentRetryCount: 0,
            pendingOperation: null
        };

        // ============================================
        // NETWORK DETECTION
        // ============================================

        function initNetworkDetection() {
            window.addEventListener('online', () => handleNetworkChange(true));
            window.addEventListener('offline', () => handleNetworkChange(false));
            
            updateNetworkStatus();
            
            // Periodic check every 30 seconds
            setInterval(updateNetworkStatus, 30000);
        }

        function handleNetworkChange(isOnline) {
            state.isOnline = isOnline;
            updateNetworkStatus();
            
            if (isOnline) {
                showBanner('Connection restored!', 'success');
                setTimeout(hideBanner, 3000);
            } else {
                showBanner('You are offline. Some features may be limited.', 'offline');
            }
        }

        function updateNetworkStatus() {
            state.isOnline = navigator.onLine;
            const statusEl = document.getElementById('networkStatus');
            const statusTextEl = document.getElementById('networkStatusText');
            
            statusEl.className = 'network-status ' + (state.isOnline ? 'online' : 'offline');
            statusTextEl.textContent = state.isOnline ? 'Online' : 'Offline';
        }

        function showBanner(message, type) {
            const banner = document.getElementById('connectionBanner');
            const bannerText = document.getElementById('bannerText');
            
            banner.className = 'connection-banner show ' + type;
            bannerText.textContent = message;
        }

        function hideBanner() {
            document.getElementById('connectionBanner').classList.remove('show');
        }

        // ============================================
        // VK BRIDGE INITIALIZATION (WITH FALLBACKS)
        // ============================================

        async function initVKBridge() {
            logDebug('Initializing VK Bridge...');
            updateProgress('Loading VK Bridge...', 'Checking connection', 10);
            
            // Check if bridge object exists
            if (typeof bridge === 'undefined') {
                logDebug('Bridge not loaded from CDN, checking alternatives...');
                
                // Try to load alternative sources
                await tryAlternativeBridges();
            }
            
            if (typeof bridge !== 'undefined' && bridge.send) {
                try {
                    logDebug('Bridge found, attempting initialization...');
                    
                    // Test if we're in VK environment
                    const testResult = await Promise.race([
                        bridge.send('VKWebAppInit'),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
                    ]);
                    
                    logDebug('Bridge initialized successfully');
                    state.bridgeAvailable = true;
                    document.getElementById('bridgeStatus').textContent = '✅ VK Bridge Connected';
                    
                    // Try to get auth token
                    await requestAuthToken();
                    
                } catch (error) {
                    logDebug(`Bridge init failed: ${error.message}`);
                    handleBridgeFailure(error);
                }
            } else {
                logDebug('No bridge available, enabling standalone mode');
                handleBridgeFailure(new Error('VK Bridge SDK not available'));
            }
        }

        async function tryAlternativeBridges() {
            // Try loading from different CDNs
            const cdnUrls = [
                'https://cdn.jsdelivr.net/npm/@vkontakte/vk-bridge@2.7.0/dist/browser.min.js',
                'https://cdnjs.cloudflare.com/ajax/libs/vk-bridge/2.7.0/browser.min.js'
            ];
            
            for (const url of cdnUrls) {
                try {
                    logDebug(`Trying to load bridge from: ${url}`);
                    await loadScript(url);
                    if (typeof bridge !== 'undefined') {
                        logDebug('Bridge loaded successfully from alternative source');
                        return true;
                    }
                } catch (e) {
                    logDebug(`Failed to load from ${url}: ${e.message}`);
                }
            }
            
            return false;
        }

        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function requestAuthToken() {
            try {
                updateProgress('Requesting permissions...', 'Waiting for authorization', 30);
                
                const authResult = await Promise.race([
                    bridge.send('VKWebAppGetAuthToken', { 
                        app_id: CONFIG.APP_ID,
                        scope: 'video,wall,offline'
                    }),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Auth timeout')), CONFIG.TIMEOUT_MS))
                ]);
                
                if (authResult.access_token) {
                    state.accessToken = authResult.access_token;
                    logDebug('Access token received');
                    
                    // Get user info
                    try {
                        const userInfo = await bridge.send('VKWebAppGetUserInfo');
                        if (userInfo && userInfo.id) {
                            state.userId = userInfo.id;
                            logDebug(`User ID: ${state.userId}`);
                        }
                    } catch (e) {
                        logDebug('Could not get user info (non-critical)');
                    }
                    
                    checkCachedData();
                } else {
                    throw new Error('No access token in response');
                }
                
            } catch (error) {
                logDebug(`Auth failed: ${error.message}`);
                throw error;
            }
        }

        function handleBridgeFailure(error) {
            state.bridgeAvailable = false;
            document.getElementById('bridgeStatus').innerHTML = '⚠️ Standalone Mode';
            
            showBanner(

        // ============================================
        // DATA FETCHING WITH RETRY LOGIC
        // ============================================

        async function startIndexing() {
            if (!state.isOnline && !state.isDemoMode) {
                showError('Offline', 'You appear to be offline. Please check your internet connection and try again.\n\nTip: You can use "Load Demo Data" to preview the app.');
                return;
            }
            
            if (!state.bridgeAvailable && !state.isDemoMode) {
                showBanner('VK Bridge not available. Using simulated data.', 'warning');
                setTimeout(() => {
                    enableDemoMode();
                }, 1500);
                return;
            }
            
            showLoading(true);
            hideError();
            state.currentRetryCount = 0;
            state.pendingOperation = 'index';
            
            await performIndexing();
        }

        async function performIndexing() {
            try {
                let fetchedContent = [];
                let offset = 0;
                let hasMore = true;
                let batchNum = 0;
                
                while (hasMore && fetchedContent.length < CONFIG.MAX_ITEMS) {
                    batchNum++;
                    updateProgress(
                        `Fetching batch ${batchNum}...`,
                        `${fetchedContent.length} items collected`,
                        Math.min((fetchedContent.length / CONFIG.MAX_ITEMS) * 90, 90)
                    );
                    
                    let result;
                    if (state.currentMode === 'video') {
                        result = await fetchWithRetry(() => fetchVideos(offset, CONFIG.BATCH_SIZE));
                    } else {
                        result = await fetchWithRetry(() => fetchPosts(offset, CONFIG.BATCH_SIZE));
                    }
                    
                    if (result && result.items && result.items.length > 0) {
                        fetchedContent = fetchedContent.concat(result.items);
                        offset += CONFIG.BATCH_SIZE;
                        
                        if (result.items.length < CONFIG.BATCH_SIZE) {
                            hasMore = false;
                        }
                    } else {
                        hasMore = false;
                    }
                    
                    // Small delay to avoid rate limiting
                    await sleep(100);
                }
                
                // Cache results
                state.allContent = fetchedContent;
                saveToStorage(state.currentMode, fetchedContent);
                
                updateProgress('✅ Complete!', `${fetchedContent.length} items indexed`, 100);
                
                setTimeout(() => {
                    hideLoading();
                    updateStats(Date.now());
                    applyFilters();
                    showBanner(`Successfully indexed ${fetchedContent.length} items!`, 'success');
                    setTimeout(hideBanner, 3000);
                }, 800);
                
            } catch (error) {
                logError('Indexing failed:', error);
                hideLoading();
                showError('Indexing Failed', formatErrorMessage(error));
            }
        }

        async function fetchWithRetry(fetchFn, retries = CONFIG.MAX_RETRIES) {
            for (let i = 0; i < retries; i++) {
                try {
                    return await fetchFn();
                } catch (error) {
                    logDebug(`Attempt ${i + 1} failed: ${error.message}`);
                    
                    if (i === retries - 1) throw error;
                    
                    updateProgress(
                        `Retrying... (${i + 1}/${retries})`,
                        error.message,
                        null
                    );
                    
                    await sleep(CONFIG.RETRY_DELAY * (i + 1));
                }
            }
        }

        async function fetchVideos(offset, count) {
            if (!state.bridgeAvailable || state.isDemoMode) {
                // Return cached/simulated data
                const data = currentModeData();
                return { items: data.slice(offset, offset + count) };
            }
            
            const result = await bridge.send('VKWebAppCallAPIMethod', {
                method: 'fave.get',
                params: {
                    access_token: state.accessToken,
                    item_type: 'video',
                    offset: offset,
                    count: count,
                    v: '5.131'
                }
            });
            
            if (result.response) {
                return {
                    items: result.response.items.map(video => ({
                        id: video.id,
                        title: video.title || 'Untitled Video',
                        duration: formatDuration(video.duration),
                        durationSeconds: video.duration || 0,
                        views: video.views || 0,
                        date: new Date((video.date || 0) * 1000).toISOString(),
                        resolution: getResolution(video.width, video.height),
                        thumbnail: video.photo_800 || video.photo_320 || null,
                        type: 'video'
                    }))
                };
            }
            
            throw new Error(result.error?.error_msg || 'Failed to fetch videos');
        }

        async function fetchPosts(offset, count) {
            if (!state.bridgeAvailable || state.isDemoMode) {
                const data = currentModeData();
                return { items: data.slice(offset, offset + count) };
            }
            
            const result = await bridge.send('VKWebAppCallAPIMethod', {
                method: 'newsfeed.get',
                params: {
                    access_token: state.accessToken,
                    filters: 'post',
                    offset: offset,
                    count: count,
                    v: '5.131'
                }
            });
            
            if (result.response) {
                return {
                    items: result.response.items.map(post => ({
                        id: post.id,
                        text: post.text || '',
                        likes: post.likes?.count || 0,
                        comments: post.comments?.count || 0,
                        reposts: post.reposts?.count || 0,
                        date: new Date((post.date || 0) * 1000).toISOString(),
                        contentType: getPostContentType(post),
                        type: 'post'
                    }))
                };
            }
            
            throw new Error(result.error?.error_msg || 'Failed to fetch posts');
        }

        // ============================================
        // STORAGE HELPERS
        // ============================================

        function saveToStorage(mode, data) {
            try {
                localStorage.setItem(CONFIG.STORAGE_KEY_PREFIX + mode, JSON.stringify({
                    data: data,
                    timestamp: Date.now()
                }));
            } catch (e) {
                logError('Storage save failed:', e);
            }
        }

        function loadFromStorage(mode) {
            try {
                const stored = localStorage.getItem(CONFIG.STORAGE_KEY_PREFIX + mode);
                return stored ? JSON.parse(stored) : null;
            } catch (e) {
                logError('Storage load failed:', e);
                return null;
            }
        }

        function currentModeData() {
            const cached = loadFromStorage(state.currentMode);
            return cached?.data || [];
        }

        function checkCachedData() {
            const cached = loadFromStorage(state.currentMode);
            if (cached && cached.data) {
                state.allContent = cached.data;
                updateStats(cached.timestamp);
                applyFilters();
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const typeValue = document.getElementById('typeFilter').value;
            const sortValue = document.getElementById('sortDropdown').value;
            const activeChips = Array.from(document.querySelectorAll('.chip.active'))
                .map(chip => ({ filter: chip.dataset.filter, value: chip.dataset.value }));
            
            state.filteredContent = state.allContent.filter(item => {
                // Search filter
                if (searchTerm) {
                    const searchableText = state.currentMode === 'video' ? item.title : item.text;
                    if (!searchableText.toLowerCase().includes(searchTerm)) return false;
                }
                
                // Type filter
                if (typeValue) {
                    if (state.currentMode === 'video' && item.resolution !== typeValue) return false;
                    if (state.currentMode === 'post' && item.contentType !== typeValue) return false;
                }
                
                // Chip filters
                for (const chip of activeChips) {
                    if (chip.filter === 'duration') {
                        if (chip.value === 'short' && item.durationSeconds >= 300) return false;
                        if (chip.value === 'medium' && (item.durationSeconds < 300 || item.durationSeconds > 1200)) return false;
                        if (chip.value === 'long' && item.durationSeconds <= 1200) return false;
                    }
                    
                    if (chip.filter === 'date') {
                        const itemDate = new Date(item.date);
                        const now = new Date();
                        
                        if (chip.value === 'week' && (now - itemDate) > 7 * 24 * 60 * 60 * 1000) return false;
                        if (chip.value === 'month' && (now - itemDate) > 30 * 24 * 60 * 60 * 1000) return false;
                        if (chip.value === 'year' && (now - itemDate) > 365 * 24 * 60 * 60 * 1000) return false;
                    }
                }
                
                return true;
            });
            
            sortContent(sortValue);
            renderContent();
        }

        function sortContent(sortValue) {
            switch (sortValue) {
                case 'newest':
                    state.filteredContent.sort((a, b) => new Date(b.date) - new Date(a.date));
                    break;
                case 'oldest':
                    state.filteredContent.sort((a, b) => new Date(a.date) - new Date(b.date));
                    break;
                case 'most-engaged':
                    state.filteredContent.sort((a, b) => 
                        (state.currentMode === 'video' ? b.views : b.likes) - 
                        (state.currentMode === 'video' ? a.views : a.likes)
                    );
                    break;
                case 'least-engaged':
                    state.filteredContent.sort((a, b) => 
                        (state.currentMode === 'video' ? a.views : a.likes) - 
                        (state.currentMode === 'video' ? b.views : b.likes)
                    );
                    break;
                case 'duration-long':
                    state.filteredContent.sort((a, b) => (b.durationSeconds || 0) - (a.durationSeconds || 0));
                    break;
                case 'duration-short':
                    state.filteredContent.sort((a, b) => (a.durationSeconds || 0) - (b.durationSeconds || 0));
                    break;
                case 'most-comments':
                    state.filteredContent.sort((a, b) => (b.comments || 0) - (a.comments || 0));
                    break;
                case 'least-comments':
                    state.filteredContent.sort((a, b) => (a.comments || 0) - (b.comments || 0));
                    break;
            }
        }

        function toggleChip(chip) {
            chip.classList.toggle('active');
            applyFilters();
        }

        function renderContent() {
            const grid = document.getElementById('contentGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (state.filteredContent.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            grid.innerHTML = state.filteredContent.map(item => {
                return state.currentMode === 'video' ? createVideoCard(item) : createPostCard(item);
            }).join('');
        }

        function createVideoCard(item) {
            const thumbnailHtml = item.thumbnail 
                ? `<img src="${item.thumbnail}" alt="${escapeHtml(item.title)}" onerror="this.parentElement.innerHTML='🎬'" loading="lazy">` 
                : '🎬';
            
            return `
                <div class="content-card">
                    <div class="card-thumbnail">${thumbnailHtml}</div>
                    <div class="card-body">
                        <div class="card-title">${escapeHtml(item.title)}</div>
                        <div class="card-meta">
                            <span class="meta-item"><span class="meta-icon">👁️</span> ${formatNumber(item.views)}</span>
                            <span class="meta-item"><span class="meta-icon">⏱️</span> ${item.duration}</span>
                        </div>
                        <div class="card-badges">
                            <span class="badge badge-resolution">${item.resolution}</span>
                            <span class="badge badge-duration">${getDurationCategory(item.durationSeconds)}</span>
                        </div>

                </div>
            `;
        }

        function createPostCard(item) {
            const iconMap = { text: '📝', photo: '🖼️', video: '🎬', link: '🔗', audio: '🎵', document: '📄' };
            
            return `
                <div class="content-card">
                    <div class="card-thumbnail" style="background: linear-gradient(135deg, #1c1c1e, #2c2c2e); font-size: 4rem;">

                    <div class="card-body">
                        <div class="card-text-preview">${escapeHtml(item.text)}</div>
                        <div class="card-meta" style="margin-top: 12px;">
                            <span class="meta-item"><span class="meta-icon">❤️</span> ${formatNumber(item.likes)}</span>
                            <span class="meta-item"><span class="meta-icon">💬</span> ${formatNumber(item.comments)}</span>
                            <span class="meta-item"><span class="meta-icon">🔄</span> ${formatNumber(item.reposts)}</span>
                        </div>
                        <div class="card-badges">
                            <span class="badge badge-type">${item.contentType}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================
        // HELPER FUNCTIONS
        // ============================================

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return h > 0 ? `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` 
                         : `${m}:${s.toString().padStart(2, '0')}`;
        }

        function getResolution(width, height) {
            if (!width || !height) return 'Unknown';
            const min = Math.min(width, height);
            if (min >= 2160) return '4K';
            if (min >= 1080) return '1080p';
            if (min >= 720) return '720p';
            if (min >= 480) return '480p';
            if (min >= 360) return '360p';
            return 'SD';
        }

        function getPostContentType(post) {
            if (post.attachments?.length > 0) return post.attachments[0].type || 'text';
            return post.text ? 'text' : 'unknown';
        }

        function getDurationCategory(seconds) {
            if (!seconds) return 'Unknown';
            if (seconds < 300) return 'Short';
            if (seconds <= 1200) return 'Medium';
            return 'Long';
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function formatErrorMessage(error) {
            const parts = [
                'Error Details:',
                '',
                `Message: ${error.message || 'Unknown error'}`,
                `Time: ${new Date().toISOString()}`,
                `Online: ${navigator.onLine}`,
                `Bridge Available: ${state.bridgeAvailable}`,
                `Demo Mode: ${state.isDemoMode}`
            ];
            
            if (error.stack) {
                parts.push('', 'Stack Trace:', error.stack.substring(0, 500));
            }
            
            return parts.join('\n');
        }

        // ============================================
        // UI CONTROLS
        // ============================================

        function updateStats(timestamp) {
            document.getElementById('totalCount').textContent = state.allContent.length;
            if (timestamp) {
                document.getElementById('lastUpdated').textContent = 
                    new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const btn = document.getElementById('indexBtn');
            const retryBtn = document.getElementById('retryBtn');
            
            if (show) {
                overlay.classList.remove('hidden');
                btn.disabled = true;
                retryBtn.classList.add('hidden');
            } else {
                overlay.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function updateProgress(text, detail, percent) {
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressDetail').textContent = detail;
            if (percent !== null && percent !== undefined) {
                document.getElementById('progressBar').style.width = percent + '%';
            }
        }

        function showError(title, details) {
            const section = document.getElementById('errorSection');
            const content = document.getElementById('errorContent');
            
            section.classList.remove('hidden');
            content.textContent = details;
            
            // Also show retry button in loading overlay if visible
            const overlay = document.getElementById('loadingOverlay');
            if (!overlay.classList.contains('hidden')) {
                document.getElementById('retryBtn').classList.remove('hidden');
            }
        }

        function hideError() {
            document.getElementById('errorSection').classList.add('hidden');
        }

        function toggleErrorDetails() {
            const details = document.getElementById('errorDetails');
            const toggle = document.getElementById('errorToggle');
            details.classList.toggle('expanded');
            toggle.classList.toggle('expanded');
        }

        function retryOperation() {
            if (state.pendingOperation === 'index') {
                startIndexing();
            }
        }

        // ============================================
        // DEBUG UTILITIES
        // ============================================

        function logDebug(message) {
            console.log(`[VK App] ${message}`);
            updateDebugPanel();
        }

        function logError(message, error) {
            console.error(`[VK App] ${message}`, error);
            updateDebugPanel();
        }

        function updateDebugPanel() {
            if (window.location.search.includes('debug=1')) {
                const panel = document.getElementById('debugPanel');
                const content = document.getElementById('debugContent');
                
                panel.classList.remove('hidden');
                content.innerHTML = `
                    <div class="debug-item">
                        <span class="debug-label">Online:</span>
                        <span class="debug-value">${state.isOnline}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Bridge:</span>
                        <span class="debug-value">${state.bridgeAvailable}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Demo Mode:</span>
                        <span class="debug-value">${state.isDemoMode}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Token:</span>
                        <span class="debug-value">${state.accessToken ? '✓ Set' : '✗ Not set'}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">User ID:</span>
                        <span class="debug-value">${state.userId || 'N/A'}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Items Loaded:</span>
                        <span class="debug-value">${state.allContent.length}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Current Mode:</span>
                        <span class="debug-value">${state.currentMode}</span>
                    </div>
                `;
            }
        }

        // ============================================
        // INITIALIZATION
        // ============================================

        document.addEventListener('DOMContentLoaded', () => {
            logDebug('App initializing...');
            
            // Initialize network detection first
            initNetworkDetection();
            
            // Initialize UI
            updateFilterOptions();
            
            // Try to initialize VK Bridge (with timeout protection)
            Promise.race([
                initVKBridge(),
                new Promise(resolve => setTimeout(resolve, 8000))
            ]).then(() => {
                logDebug('Initialization complete');
                hideLoading();
                updateDebugPanel();
            }).catch(error => {
                logError('Init error:', error);
                hideLoading();
            });
        });

        // Global error handler
        window.addEventListener('error', (event) => {
            logError('Global error:', event.error);
        });

        // Handle unhandled promise rejections
        window.addEventListener('unhandledrejection', (event) => {
            logError('Unhandled rejection:', event.reason);
        });
    </script>
</body>
</html>
